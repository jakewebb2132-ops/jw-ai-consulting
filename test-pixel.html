<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Reveal - Pixel Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 40px; background: #f8fafc; color: #1e293b; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; }
        h1 { margin-top: 0; color: #0f172a; }
        .status { padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .status-idle { background: #f1f5f9; color: #64748b; }
        .status-sending { background: #eff6ff; color: #3b82f6; }
        .status-success { background: #f0fdf4; color: #16a34a; }
        .status-error { background: #fef2f2; color: #dc2626; }
        pre { background: #1e293b; color: #f8fafc; padding: 20px; border-radius: 12px; overflow-x: auto; font-size: 12px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Executive Reveal - Pixel Test</h1>
        <p>This page mimics a visitor to <strong>jwaiconsulting.com</strong>. It will attempt to fire a pulse to the identification API.</p>
        
        <div id="status" class="status status-idle">Ready to fire</div>
        
        <div style="margin: 20px 0;">
            <button onclick="firePixel()">Manually fire pulse</button>
        </div>

        <h3>Debug Output:</h3>
        <pre id="output">Waiting for interaction...</pre>
    </div>

    <!-- The Pixel Script -->
    <script src="/reveal.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');

        function log(msg) {
            outputEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + outputEl.textContent;
        }

        async function firePixel() {
            statusEl.className = 'status status-sending';
            statusEl.textContent = 'Sending pulse...';
            log('Firing Manual Pulse...');

            try {
                // Manually trigger what reveal.js does
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.fillText("ExecutiveReveal", 2, 15);
                const canvasHash = canvas.toDataURL().substring(0, 50);

                const data = {
                    visitor_id: btoa(window.navigator.userAgent + '|' + canvasHash),
                    url: window.location.href,
                    referrer: document.referrer || 'direct',
                    event: 'manual_test',
                    timestamp: new Date().toISOString()
                };

                const response = await fetch('/api/identify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    statusEl.className = 'status status-success';
                    statusEl.textContent = 'Pulse Successful';
                    log('SUCCESS: API responded with ' + JSON.stringify(result));
                } else {
                    const error = await response.text();
                    statusEl.className = 'status status-error';
                    statusEl.textContent = 'Pulse Failed';
                    log('ERROR: HTTP ' + response.status + ' - ' + error);
                }
            } catch (err) {
                statusEl.className = 'status status-error';
                statusEl.textContent = 'Network Error';
                log('NETWORK ERROR: ' + err.message);
            }
        }
    </script>
</body>
</html>
